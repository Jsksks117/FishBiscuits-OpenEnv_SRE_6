spec_version: 1
name: SRE_Agent
type: space
runtime: fastapi
app: server.app:app
port: 7860

tasks:
  - id: "task_1_permissions"
    name: "Fix File Permissions"
    grader: "tasks:_grade_permissions"
  - id: "task_2_service"
    name: "Restart Crashed Web Server"
    grader: "tasks:_grade_service"
  - id: "task_3_nginx_config"
    name: "Fix Broken Nginx Configuration"
    grader: "tasks:_grade_nginx_config"
  - id: "task_4_disk_pressure"
    name: "Emergency Disk Clearance"
    grader: "tasks:_grade_disk_pressure"
  - id: "task_5_db_pipeline"
    name: "DB Corruption Pipeline"
    grader: "tasks:_grade_db_pipeline"
  - id: "task_6_dns_poisoning"
    name: "Fix Local Service Discovery"
    grader: "tasks:_grade_dns_poisoning"
  - id: "task_7_web_restore"
    name: "Webserver Pipeline Complete Restore"
    grader: "tasks:_grade_web_restore"
  - id: "task_8_disk_clean"
    name: "Disk Clean & Service Chain"
    grader: "tasks:_grade_disk_clean"
